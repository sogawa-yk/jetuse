name: release

# Publicз‰€(ORMгѓЇгѓіг‚ЇгѓЄгѓѓг‚Ї): main гЃё push гЃ•г‚ЊгЃџг‚‰
#  - API / fn-router г‚ігѓігѓ†гѓЉг‚¤гѓЎгѓјг‚ёг‚’ GHCR гЃЁ OCIR(ap-osaka-1) гЃ®дёЎж–№гЃё publish
#    OCI Functions гЃЇ OCIRеї…й €гѓ»Container Instance г‚‚ OCIR г‚’еЏ‚з…§гЃ™г‚‹(ADR-0011)гЂ‚
#  - SPA(dist)г‚’гѓ“гѓ«гѓ‰гЃ—гЃ¦гѓЄгѓќг‚ёгѓ€гѓЄгЃёг‚ігѓџгѓѓгѓ€(ORMгЃ®zipгЃ«еђЊжў±гЃ— Terraform гЃЊй…ЌдїЎ)
# еї…и¦ЃгЃЄ GitHub Secrets:
#  - OCIR_USERNAME: "<namespace>/<user>"(Identity Domainе€©з”Ёж™‚гЃЇ
#                   "<namespace>/oracleidentitycloudservice/<user>")
#  - OCIR_TOKEN:    OCI Auth Token
# е‰ЌжЏђ: OCIR гѓЄгѓќг‚ёгѓ€гѓЄ(jetuse-api / jetuse-fn-router)гЃЊдє‹е‰ЌдЅњж€ђжё€гЃї(module.ocir гЃЊдЅњж€ђ)гЂ‚

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  # OCIR(ap-osaka-1)гЂ‚namespace гЃЇ tenancy е›єжњ‰(ж©џеЇ†гЃ§гЃЇгЃЄгЃ„)гЂ‚е€Ґз’°еўѓгЃ§гЃЇ Variables гЃ§дёЉж›ёгЃЌеЏЇгЂ‚
  OCIR_REGISTRY: ${{ vars.OCIR_REGISTRY || 'kix.ocir.io' }}
  OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE || 'idqcucnenh88' }}

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to OCIR (ap-osaka-1)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jetuse-api:latest
            ghcr.io/${{ github.repository_owner }}/jetuse-api:${{ github.sha }}
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-api:latest
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-api:${{ github.sha }}
      - name: Build & push Functions router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Containerfile.fn
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jetuse-fn-router:latest
            ghcr.io/${{ github.repository_owner }}/jetuse-fn-router:${{ github.sha }}
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:latest
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:${{ github.sha }}

  spa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Commit dist (self-contained ORM zip)
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f packages/web/dist
          if git diff --cached --quiet; then
            echo "dist unchanged"
          else
            git commit -m "chore(spa): rebuild dist for ORM deploy [skip ci]"
            git push
          fi
