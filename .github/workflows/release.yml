name: release

# Public版(ORMワンクリック): main へ push されたら
#  - API / fn-router コンテナイメージを GHCR と対応4リージョンの OCIR
#    (大阪 kix / 東京 nrt / アシュバーン iad / シカゴ ord)へ publish。
#    OCI Functions は同一リージョンの OCIR 必須のため、対応リージョンぶん事前 push する
#    (ADR-0011/0017)。ORM スタックはデプロイリージョンの OCIR を自動選択。
#    前提: 各リージョンに OCIR リポジトリ(jetuse-api / jetuse-fn-router)を人間が事前作成
#    (無いと push がルートコンパートメントへの自動作成を試み権限不足で失敗)。
#  - SPA(dist)をビルドし、Terraformと共にDeploy専用zipへ同梱
#  - IAMとJetUse本体を含む1つのzipをGitHubのorm-mainリリースへpublish
# 必要な GitHub Secrets:
#  - OCIR_USERNAME: "<namespace>/<user>"(Identity Domain利用時は
#                   "<namespace>/oracleidentitycloudservice/<user>")
#  - OCIR_TOKEN:    OCI Auth Token(全リージョン共通で有効)

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  # 対応リージョン(ADR-0017): kix=大阪 nrt=東京 iad=アシュバーン ord=シカゴ。
  # 追加/変更時は login・tags・infra/orm/locals.tf の ocir_supported_region_keys を揃えること。
  # namespace は tenancy 固有(機密ではない)。別環境では Variables で上書き可。
  OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE || 'idqcucnenh88' }}

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to OCIR (supported regions)
        run: |
          for r in kix nrt iad ord; do
            echo "${{ secrets.OCIR_TOKEN }}" | docker login "${r}.ocir.io" \
              --username "${{ secrets.OCIR_USERNAME }}" --password-stdin
          done
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jetuse-api:latest
            ghcr.io/${{ github.repository_owner }}/jetuse-api:${{ github.sha }}
            kix.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:latest
            kix.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:${{ github.sha }}
            nrt.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:latest
            nrt.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:${{ github.sha }}
            iad.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:latest
            iad.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:${{ github.sha }}
            ord.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:latest
            ord.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-api:${{ github.sha }}
      - name: Build & push Functions router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Containerfile.fn
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jetuse-fn-router:latest
            ghcr.io/${{ github.repository_owner }}/jetuse-fn-router:${{ github.sha }}
            kix.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:latest
            kix.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:${{ github.sha }}
            nrt.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:latest
            nrt.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:${{ github.sha }}
            iad.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:latest
            iad.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:${{ github.sha }}
            ord.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:latest
            ord.ocir.io/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:${{ github.sha }}

  spa:
    # イメージの4リージョン push が失敗したら zip も公開しない(存在しないイメージを参照する
    # スタックの配布を防ぐ — ADR-0017)
    needs: images
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Build Deploy to OCI archive
        working-directory: .
        run: bash scripts/package-orm-stacks.sh "$RUNNER_TEMP/orm-packages"
      - name: Publish Deploy to OCI archive
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view orm-main >/dev/null 2>&1; then
            gh release create orm-main \
              --target "$GITHUB_SHA" \
              --prerelease \
              --title "Deploy to OCI packages (main)" \
              --notes "Continuously updated Resource Manager package for the main branch. Use the README deployment button."
          fi
          gh release upload orm-main \
            "$RUNNER_TEMP/orm-packages/jetuse-orm.zip" \
            --clobber
      - name: Commit dist (self-contained ORM zip)
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f packages/web/dist
          if git diff --cached --quiet; then
            echo "dist unchanged"
          else
            git commit -m "chore(spa): rebuild dist for ORM deploy [skip ci]"
            git push
          fi
