name: release

# Public版(ORMワンクリック): main へ push されたら
#  - API / fn-router コンテナイメージを GHCR と OCIR(ap-osaka-1) の両方へ publish
#    OCI Functions は OCIR必須・Container Instance も OCIR を参照する(ADR-0011)。
#  - SPA(dist)をビルドし、Terraformと共にDeploy専用zipへ同梱
#  - IAM Bootstrap / JetUse本体のzipをGitHubのorm-mainリリースへpublish
# 必要な GitHub Secrets:
#  - OCIR_USERNAME: "<namespace>/<user>"(Identity Domain利用時は
#                   "<namespace>/oracleidentitycloudservice/<user>")
#  - OCIR_TOKEN:    OCI Auth Token
# 前提: OCIR リポジトリ(jetuse-api / jetuse-fn-router)が事前作成済み(module.ocir が作成)。

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  # OCIR(ap-osaka-1)。namespace は tenancy 固有(機密ではない)。別環境では Variables で上書き可。
  OCIR_REGISTRY: ${{ vars.OCIR_REGISTRY || 'kix.ocir.io' }}
  OCIR_NAMESPACE: ${{ vars.OCIR_NAMESPACE || 'idqcucnenh88' }}

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to OCIR (ap-osaka-1)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jetuse-api:latest
            ghcr.io/${{ github.repository_owner }}/jetuse-api:${{ github.sha }}
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-api:latest
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-api:${{ github.sha }}
      - name: Build & push Functions router image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Containerfile.fn
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jetuse-fn-router:latest
            ghcr.io/${{ github.repository_owner }}/jetuse-fn-router:${{ github.sha }}
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:latest
            ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/jetuse-fn-router:${{ github.sha }}

  spa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Build Deploy to OCI archives
        working-directory: .
        run: bash scripts/package-orm-stacks.sh "$RUNNER_TEMP/orm-packages"
      - name: Publish Deploy to OCI archives
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view orm-main >/dev/null 2>&1; then
            gh release create orm-main \
              --target "$GITHUB_SHA" \
              --prerelease \
              --title "Deploy to OCI packages (main)" \
              --notes "Continuously updated Resource Manager packages for the main branch. Use the README deployment buttons."
          fi
          gh release upload orm-main \
            "$RUNNER_TEMP/orm-packages/jetuse-orm.zip" \
            "$RUNNER_TEMP/orm-packages/jetuse-iam-bootstrap.zip" \
            --clobber
      - name: Commit dist (self-contained ORM zip)
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f packages/web/dist
          if git diff --cached --quiet; then
            echo "dist unchanged"
          else
            git commit -m "chore(spa): rebuild dist for ORM deploy [skip ci]"
            git push
          fi
