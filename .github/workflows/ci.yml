name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt
        run: terraform fmt -check -recursive infra
      - name: validate dev
        working-directory: infra/terraform/environments/dev
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: validate orm (ワンクリックスタック)
        working-directory: infra/orm
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: test public IAM policy contract
        working-directory: infra/terraform/modules/iam
        run: |
          terraform init -backend=false -input=false
          terraform test
      - name: Build Deploy to OCI archive
        run: bash scripts/package-orm-stacks.sh "$RUNNER_TEMP/orm-packages"
      - name: Validate packaged JetUse stack
        run: |
          mkdir -p "$RUNNER_TEMP/orm-app"
          unzip -q "$RUNNER_TEMP/orm-packages/jetuse-orm.zip" -d "$RUNNER_TEMP/orm-app"
          test -f "$RUNNER_TEMP/orm-app/schema.yaml"
          test -f "$RUNNER_TEMP/orm-app/main.tf"
          grep -q '^  enable_dynamic_group:' "$RUNNER_TEMP/orm-app/schema.yaml"
          grep -q '^  enable_runtime_policy:' "$RUNNER_TEMP/orm-app/schema.yaml"
          terraform -chdir="$RUNNER_TEMP/orm-app" init -backend=false -input=false
          terraform -chdir="$RUNNER_TEMP/orm-app" validate
