name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # api のテスト(test_central_registry / test_plugin_publisher)は jetuse_registry(PLG-04)を
        # import する(PLG-05 publish・PLG-06 マーケットの統合検証で実 RegistryService を使う)。
        # registry は ../api へ path 依存するため dev extras に入れると循環で解決不能。api を先に
        # editable 導入し、registry は --no-deps で追加導入して循環を断つ(cwd=packages/api)。
        run: |
          pip install -e ".[dev]"
          pip install -e ../registry --no-deps
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  registry:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/registry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        # jetuse-registry は jetuse-api(=PLG-01 manifest)へ path 依存。editable install で解決する。
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt
        run: terraform fmt -check -recursive infra
      - name: validate dev
        working-directory: infra/terraform/environments/dev
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: validate orm (ワンクリックスタック)
        working-directory: infra/orm
        run: |
          terraform init -backend=false -input=false
          terraform validate
      - name: validate plugin-registry (PLG-04 / plan-check root)
        working-directory: infra/terraform/modules/plugin-registry/examples/plan-check
        run: |
          terraform init -backend=false -input=false
          terraform validate
