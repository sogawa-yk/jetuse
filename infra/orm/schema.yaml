title: "JetUse on OCI — ワンクリックデプロイ"
description: >-
  生成AIアプリ JetUse を OCI 上に一括構築します（VCN / Autonomous Database /
  API Gateway / Container Instance / Functions / Object Storage / Identity Domain / IAM）。
  実行ユーザーの権限や既存IAMに応じて、Dynamic GroupとPolicyの作成範囲を選択できます。
  デプロイ後、出力の app_url を開き demo ユーザーでログインしてください。
schemaVersion: 1.1.0
version: "20260702"

logoUrl: ""

locale: "en"

variableGroups:
  - title: "必須"
    variables:
      - compartment_ocid
  - title: "アプリ設定"
    variables:
      - prefix
      - enable_auth
      - demo_email
      - adb_admin_password
  - title: "IAM設定（実行ユーザーの権限に応じて選択）"
    variables:
      - enable_dynamic_group
      - existing_dynamic_group
      - enable_runtime_policy
      - enable_semantic_store
  - title: "オプション（詳細）"
    variables:
      - enable_opensearch
      - rate_limit_rps
      - ocir_namespace
      - image_repo_prefix
      - api_image_url
      - fn_router_image
  - title: "Hidden"
    visible: false
    variables:
      - tenancy_ocid
      - region

variables:
  compartment_ocid:
    type: oci:identity:compartment:id
    title: "コンパートメント"
    description: "リソースを作成するコンパートメント"
    required: true

  prefix:
    type: string
    title: "リソース名プレフィックス"
    description: "作成リソースの名前接頭辞（英小文字+数字）"
    default: "jetuse"
    required: true

  enable_auth:
    type: boolean
    title: "OIDC認証を有効化"
    description: "Identity Domain + OIDCアプリ + デモユーザーを作成し、ログインを必須にする"
    default: true

  enable_dynamic_group:
    type: boolean
    title: "Dynamic Groupを作成"
    description: "テナンシIAM権限がある場合はオン。オフの場合は既存のDynamic Group名を下の欄に入力してください（namespace参照Policyも既存であることが前提です）。"
    default: true

  existing_dynamic_group:
    type: string
    title: "既存のDynamic Group名"
    description: "Runtime Policyが参照する既存Dynamic Group名（Dynamic Groupを作成しない場合は必須）。Matching RuleにContainer Instance / Functions / ADB / Semantic Storeを含めてください"
    visible:
      not:
        - enable_dynamic_group

  enable_runtime_policy:
    type: boolean
    title: "ランタイムPolicyを作成"
    description: "対象コンパートメントにPolicyを作成できる場合はオン。オフの場合はJetUseのruntime Policyが既存であることが前提です。"
    default: true

  enable_semantic_store:
    type: boolean
    title: "SQL Search用Semantic Store権限"
    description: "SQL Searchを使用しない場合はオフにするとDynamic GroupとPolicy文を減らせます。"
    default: true

  demo_email:
    type: string
    title: "デモユーザーのメール"
    description: "デモログインユーザーのメールアドレス"
    default: "demo@example.com"
    visible: enable_auth

  adb_admin_password:
    type: password
    title: "ADB ADMIN パスワード（任意）"
    description: "空欄なら自動生成します（出力に表示）。12〜30文字・英大小+数字"
    required: false

  enable_opensearch:
    type: boolean
    title: "OpenSearch RAG を有効化"
    description: "常設課金（高コスト）。RAGのOpenSearchバックエンドを使う場合のみ"
    default: false

  rate_limit_rps:
    type: number
    title: "APIレート上限（req/秒）"
    description: "0で無効"
    default: 20

  ocir_namespace:
    type: string
    title: "OCIR ネームスペース"
    description: "コンテナイメージを置くOCIRのネームスペース（= Object Storage namespace）"
    default: "idqcucnenh88"
    required: true

  image_repo_prefix:
    type: string
    title: "OCIRイメージ repo プレフィックス"
    description: "イメージrepo名の接頭辞。release.ymlのpush先(jetuse-api/jetuse-fn-router)に合わせる。通常変更不要"
    default: "jetuse"
    required: true

  api_image_url:
    type: string
    title: "API コンテナイメージ（上書き）"
    description: "通常は空欄。空ならデプロイリージョンのOCIRパスを自動合成（<region-key>.ocir.io/<namespace>/<prefix>-api:latest。対応: 大阪/東京/アシュバーン/シカゴ）"
    required: false

  fn_router_image:
    type: string
    title: "Functions ルーターイメージ（上書き）"
    description: "通常は空欄。空ならデプロイリージョンのOCIRパスを自動合成（対応: 大阪/東京/アシュバーン/シカゴ）。対応外リージョンでは自リージョンOCIRへミラーし api_image_url と合わせて指定"
    required: false

  tenancy_ocid:
    type: oci:identity:tenancy:id
    title: "Tenancy"
    visible: false

  region:
    type: oci:identity:region:name
    title: "Region"
    visible: false

outputs:
  app_url:
    type: link
    title: "アプリURL"
  demo_username:
    type: string
    title: "デモユーザー"
  demo_password:
    type: string
    title: "デモパスワード"
  runtime_dynamic_group:
    type: string
    title: "Runtime Dynamic Group"
  runtime_policy_id:
    type: string
    title: "Runtime Policy OCID"

outputGroups:
  - title: "デプロイ結果"
    outputs:
      - app_url
      - demo_username
      - demo_password
      - runtime_dynamic_group
      - runtime_policy_id
