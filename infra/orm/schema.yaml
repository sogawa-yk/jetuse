title: "JetUse on OCI — ワンクリックデプロイ"
description: >-
  生成AIアプリ JetUse を OCI 上に一括構築します（VCN / Autonomous Database /
  API Gateway / Container Instance / Functions / Object Storage / Identity Domain / IAM）。
  実行ユーザーの権限や既存IAMに応じて、Dynamic GroupとPolicyの作成範囲を選択できます。
  デプロイ後、出力の app_url を開き demo ユーザーでログインしてください。
schemaVersion: 1.1.0
version: "20260713"

logoUrl: ""

locale: "en"

variableGroups:
  - title: "必須"
    variables:
      - compartment_ocid
  - title: "アプリ設定"
    variables:
      - prefix
      - enable_auth
      - oidc_audience
      - oidc_issuer
      - oidc_jwks_url
      - demo_email
      - adb_admin_password
  - title: "IAM設定（実行ユーザーの権限に応じて選択）"
    variables:
      - enable_dynamic_group
      - existing_dynamic_group
      - enable_runtime_policy
      - enable_semantic_store
      - semstore_ocid
      - enable_project_autocreate
  - title: "リージョン・サービス枠（可搬性）"
    variables:
      - allow_unvalidated_genai_region
      - adb_db_version
      - adb_ecpu_count
      - ci_shape
  - title: "オプション（詳細・通常変更不要）"
    variables:
      - project_ocid
      - enable_opensearch
      - rate_limit_rps
      - image_repo_prefix
      - api_image_url
      - fn_router_image
      - ocir_namespace
  - title: "Hidden"
    visible: false
    variables:
      - tenancy_ocid
      - region

variables:
  compartment_ocid:
    type: oci:identity:compartment:id
    title: "コンパートメント"
    description: "リソースを作成するコンパートメント"
    required: true

  prefix:
    type: string
    title: "リソース名プレフィックス"
    description: "作成リソースの名前接頭辞（英小文字+数字）"
    default: "jetuse"
    required: true

  enable_auth:
    type: boolean
    title: "OIDC認証を有効化"
    description: "Identity Domain + OIDCアプリ + デモユーザーを作成し、ログインを必須にする"
    default: true

  oidc_audience:
    type: string
    title: "OIDC audience"
    description: "APIが検証するaudience（アプリ登録のprimary audience、または実トークンのaud実測値）。認証有効時は必須（未設定はplanで停止 — SP2-04 fail-closed）"
    visible: enable_auth

  oidc_issuer:
    type: string
    title: "OIDC issuer"
    description: "トークンのiss（discoveryのissuerをそのまま。世代で異なるため固定既定なし）。認証有効時は必須（未設定はplanで停止）"
    visible: enable_auth

  oidc_jwks_url:
    type: string
    title: "OIDC JWKS URL（任意）"
    description: "discoveryのjwks_uri。空なら本スタック作成ドメインの /admin/v1/SigningCert/jwk を使用"
    visible: enable_auth

  enable_dynamic_group:
    type: boolean
    title: "Dynamic Groupを作成"
    description: "テナンシIAM権限がある場合はオン。オフの場合は既存のDynamic Group名を下の欄に入力してください（namespace参照Policyも既存であることが前提です）。"
    default: true

  existing_dynamic_group:
    type: string
    title: "既存のDynamic Group名"
    description: "Runtime Policyが参照する既存Dynamic Group名（Dynamic Groupを作成しない場合は必須）。Matching RuleにContainer Instance / Functions / ADB / Semantic Storeを含めてください"
    visible:
      not:
        - enable_dynamic_group

  enable_runtime_policy:
    type: boolean
    title: "ランタイムPolicyを作成"
    description: "対象コンパートメントにPolicyを作成できる場合はオン。オフの場合はJetUseのruntime Policyが既存であることが前提です。"
    default: true

  enable_semantic_store:
    type: boolean
    title: "SQL Search用Semantic Store権限"
    description: "SQL Searchを使用しない場合はオフにするとDynamic GroupとPolicy文を減らせます。使用する場合は下のSemantic Store OCIDも設定してください（未設定だとIAMだけ作られNL2SQLは503）。"
    default: true

  semstore_ocid:
    type: string
    title: "Semantic Store OCID（SQL Search用・任意）"
    description: "NL2SQL（SQL Search）が使う既存のGenerative AI Semantic StoreのOCID。スタックは実体を作らずIAM権限のみ付与します。空ならNL2SQLは無効（503）。"
    required: false
    visible: enable_semantic_store

  demo_email:
    type: string
    title: "デモユーザーのメール"
    description: "デモログインユーザーのメールアドレス"
    default: "demo@example.com"
    visible: enable_auth

  adb_admin_password:
    type: password
    title: "ADB ADMIN パスワード（任意）"
    description: "空欄なら自動生成します（出力に表示）。12〜30文字・英大小+数字"
    required: false

  project_ocid:
    type: string
    title: "GenerativeAI Project OCID（任意）"
    description: "RAG・会話メモリが使う GenerativeAiProject。空欄なら既存のACTIVEなprojectを自動検出し、無ければ自動作成します（自動作成は下のIAM設定でオフにできます）"
    required: false

  enable_project_autocreate:
    type: boolean
    title: "GenerativeAI Projectの自動作成を許可"
    description: "RAG・会話メモリに必須のGenerativeAiProjectが無い場合にアプリが自動作成します（IAMに manage generative-ai-project を含めます）。オフの場合は Project OCID の明示指定を推奨"
    default: true

  allow_unvalidated_genai_region:
    type: boolean
    title: "GenAI未検証リージョンへのデプロイを許可"
    description: "GenAI（推論/agentic API）が実証済みなのは大阪（ap-osaka-1）とシカゴ（us-chicago-1）のみ。他リージョンはアプリのapplyは通ってもRAG/会話メモリ/デモ生成が動きません。承知の上で他リージョンへ進める場合のみオン。"
    default: false

  adb_db_version:
    type: string
    title: "ADB バージョン"
    description: "Select AIベクトル索引（RAG）は 26ai 必須。26ai非提供のリージョン/レルムでは変更が必要な場合があります。通常は既定のまま。"
    default: "26ai"

  adb_ecpu_count:
    type: number
    title: "ADB ECPU 数"
    description: "新規テナンシは ADB ECPU のサービス枠が 0 のことが多く、その場合 apply が LimitExceeded で落ちます。事前にリージョンのADB ECPU枠を確認してください。"
    default: 2
    minimum: 2

  ci_shape:
    type: string
    title: "API コンテナ shape"
    description: "APIのContainer Instance shape。CI.Standard.E4.Flex が無いリージョンでのみ変更。通常は既定のまま。"
    default: "CI.Standard.E4.Flex"

  enable_opensearch:
    type: boolean
    title: "OpenSearch RAG を有効化"
    description: "常設課金（高コスト）。RAGのOpenSearchバックエンドを使う場合のみ"
    default: false

  rate_limit_rps:
    type: number
    title: "APIレート上限（req/秒）"
    description: "0で無効"
    default: 20

  ocir_namespace:
    type: string
    title: "OCIR ネームスペース（通常変更不要）"
    description: "JetUse公開イメージのレジストリnamespace。既定値はcross-tenancy pullに必要なので通常は変更しません。自テナンシのObject Storage namespaceとは無関係です。変更する場合はイメージを自テナンシのOCIRへミラーした上で、下のAPI/Functionsイメージ（api_image_url・fn_router_image）を両方必須で指定してください（単独変更はplan時にエラーになります）。"
    default: "idqcucnenh88"
    required: false

  image_repo_prefix:
    type: string
    title: "OCIRイメージ repo プレフィックス"
    description: "イメージrepo名の接頭辞。release.ymlのpush先(jetuse-api/jetuse-fn-router)に合わせる。通常変更不要"
    default: "jetuse"
    required: true

  api_image_url:
    type: string
    title: "API コンテナイメージ（上書き）"
    description: "通常は空欄。空ならデプロイリージョンのOCIRパスを自動合成（<region-key>.ocir.io/<namespace>/<prefix>-api:latest。イメージ提供: 大阪/東京/アシュバーン/シカゴの4リージョン。ただしGenAI実証済は大阪/シカゴの2リージョンのみ）"
    required: false

  fn_router_image:
    type: string
    title: "Functions ルーターイメージ（上書き）"
    description: "通常は空欄。空ならデプロイリージョンのOCIRパスを自動合成（イメージ提供4リージョン: 大阪/東京/アシュバーン/シカゴ。GenAI実証済は大阪/シカゴのみ）。対応外リージョンでは自リージョンOCIRへミラーし api_image_url と合わせて指定"
    required: false

  tenancy_ocid:
    type: oci:identity:tenancy:id
    title: "Tenancy"
    visible: false

  region:
    type: oci:identity:region:name
    title: "Region"
    visible: false

outputs:
  app_url:
    type: link
    title: "アプリURL"
  demo_username:
    type: string
    title: "デモユーザー"
  demo_password:
    type: string
    title: "デモパスワード"
  runtime_dynamic_group:
    type: string
    title: "Runtime Dynamic Group"
  runtime_policy_id:
    type: string
    title: "Runtime Policy OCID"

outputGroups:
  - title: "デプロイ結果"
    outputs:
      - app_url
      - demo_username
      - demo_password
      - runtime_dynamic_group
      - runtime_policy_id
