# JetUse 本体(FastAPI)Deployment **雛形**(ADR-0017 §3)。イメージは OCIR(ap-osaka-1。ADR-0011)。
# 非秘密は ConfigMap、秘密は Secret から envFrom する。秘密(DB 資格情報)は本体のみが保持する(D5)。
# この YAML はそのまま apply せず、`${JETUSE_API_IMAGE}` を envsubst で埋めてから apply する
# (README §1 step 4)。OCI 認証 on OKE が未確定のため本体の実 OKE 起動は移行 follow-up(人間ゲート)。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jetuse-api
  namespace: jetuse-system
  labels:
    app.kubernetes.io/name: jetuse-api
    app.kubernetes.io/part-of: jetuse
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jetuse-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jetuse-api
        app.kubernetes.io/part-of: jetuse
    spec:
      # OCI 認証方式は移行時の決定事項(人間ゲート。README §1 step 3)。既定は **instance principal**
      # (worker ノードの dynamic group。SA token 不要 → automount は false)。OKE Workload Identity を
      # 使う場合のみ automount を true にし、SDK の workload identity signer を有効化する(コード対応が前提)。
      serviceAccountName: jetuse-api-sa
      automountServiceAccountToken: false
      # 非 root 実行(Containerfile が USER 10001 を宣言。runAsNonRoot を kubelet が検証可能)。
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # 実値は CI/CD で envsubst 展開(例: kix.ocir.io/<namespace>/jetuse-dev-api:<tag>)。
          # `export JETUSE_API_IMAGE=...; envsubst < deployment.yaml | kubectl apply -f -`。
          image: ${JETUSE_API_IMAGE}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: jetuse-api-config
            - secretRef:
                name: jetuse-api-secrets
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          # ヘルスエンドポイントは FastAPI 実装の `/healthz`(prefix なし。service/main.py 参照)。
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
