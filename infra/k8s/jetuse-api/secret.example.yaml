# JetUse 本体の **秘密**(Secret)の作り方(雛形)。**そのまま apply しない**(プレースホルダ秘密を
# 作る誤運用を防ぐため、本ファイルはコメントのみ。実値はコミットしない)。
# 本体だけが DB 資格情報/broker 署名鍵を保持する(L3 デモには配らない=ADR-0014 D5)。
# 実運用では OCI Vault + Secrets Store CSI Driver での参照が望ましい(本コマンドは MVP の最小形)。
#
# 推奨: kubectl で直接作成する(YAML をコミットしない):
#
#   kubectl -n jetuse-system create secret generic jetuse-api-secrets \
#     --from-literal=ADB_PASSWORD=... \
#     --from-literal=ADB_WALLET_PASSWORD=... \
#     --from-literal=PLATFORM_BROKER_SECRET=...
#
# 参照: deployment.yaml は envFrom で `jetuse-api-secrets` を読み込む。
#
# --- 参考: 同等の Secret マニフェスト(コメントアウト。apply しないこと) ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: jetuse-api-secrets
#   namespace: jetuse-system
#   labels:
#     app.kubernetes.io/name: jetuse-api
#     app.kubernetes.io/part-of: jetuse
# type: Opaque
# stringData:
#   ADB_PASSWORD: "<real-value-not-committed>"
#   ADB_WALLET_PASSWORD: "<real-value-not-committed>"
#   PLATFORM_BROKER_SECRET: "<real-value-not-committed>"
