# JetUse 本体用 ServiceAccount(ADR-0017 §3)。
# OKE Workload Identity(resource principal 相当)を使う場合、この SA を IAM の dynamic group に紐付け、
# Pod の projected token で OCI へ認証する(automountServiceAccountToken: true が必要)。IAM は人間ゲート。
# 代替として instance principal(worker ノードの dynamic group)を使う場合は本 SA 認証は不要。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jetuse-api-sa
  namespace: jetuse-system
  labels:
    app.kubernetes.io/name: jetuse-api
    app.kubernetes.io/part-of: jetuse
